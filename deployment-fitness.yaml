apiVersion: apps/v1
kind: Deployment
metadata:
  name: fitness-deployment
  labels:
    app: fitness
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fitness
  template:
    metadata:
      labels:
        app: fitness
    spec:
      containers:
        - name: fitness-tracker
          image: angira9/fitness-tracker:latest
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    app: web
ports:
  -protocol: TCP
    port: 80
    targetPort: 3000
type: ClusterIP

